name: Deploy website to ALL-INKL

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PHP and deployment tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends composer lftp php-cli php-mbstring

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Validate contact backend
        run: |
          composer validate --strict
          find public/api server/contact -type f -name '*.php' -print0 | xargs -0 -n1 php -l
          composer test

      - name: Build website
        run: npm run build
        env:
          PUBLIC_IS_DEMO: "false"
          PUBLIC_SITE_IN_PROGRESS: ${{ vars.PUBLIC_SITE_IN_PROGRESS || 'true' }}
          PUBLIC_CONTACT_EMAIL: ${{ vars.CONTACT_INFO_EMAIL || 'info@elena-roehrborn.de' }}
          PUBLIC_FORM_EMAIL: ${{ vars.CONTACT_FORM_EMAIL || 'formular@elena-roehrborn.de' }}
          PUBLIC_CONTACT_RECIPIENT_NAME: ${{ vars.CONTACT_RECIPIENT_NAME || 'Elena Roehrborn' }}
          PUBLIC_CONTACT_REPLY_WITHIN: ${{ vars.CONTACT_REPLY_WITHIN || 'innerhalb von zwei Werktagen' }}

      - name: Generate private contact configuration
        run: node scripts/generate-contact-config.mjs
        env:
          SITE_IN_PROGRESS: ${{ vars.PUBLIC_SITE_IN_PROGRESS || 'true' }}
          CONTACT_FORM_ENABLED: ${{ vars.CONTACT_FORM_ENABLED }}
          SMTP_FORM_USERNAME: ${{ vars.CONTACT_FORM_EMAIL || 'formular@elena-roehrborn.de' }}
          SMTP_INFO_USERNAME: ${{ vars.CONTACT_INFO_EMAIL || 'info@elena-roehrborn.de' }}
          CONTACT_SENDER_NAME: ${{ vars.CONTACT_SENDER_NAME || 'Elena Roehrborn Onlinetherapie' }}
          CONTACT_RECIPIENT_NAME: ${{ vars.CONTACT_RECIPIENT_NAME || 'Elena Roehrborn' }}
          CONTACT_REPLY_WITHIN: ${{ vars.CONTACT_REPLY_WITHIN || 'innerhalb von zwei Werktagen' }}
          SMTP_HOST: ${{ vars.SMTP_HOST || 'w021d308.kasserver.com' }}
          SMTP_FORM_PASSWORD: ${{ secrets.SMTP_FORM_PASSWORD }}
          SMTP_INFO_PASSWORD: ${{ secrets.SMTP_INFO_PASSWORD }}

      - name: Deploy website and private contact backend via FTPS
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_SERVER:21" <<'LFTP'
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          set ftp:passive-mode true
          set ftp:ssl-force true
          set ftp:ssl-auth TLS
          set ftp:ssl-protect-data true
          set ssl:verify-certificate true
          mkdir -p /private/form-backend/vendor
          mkdir -p /private/form-backend/server/contact/src
          mirror --reverse --delete --no-perms --verbose=1 ./vendor/ /private/form-backend/vendor/
          mirror --reverse --delete --no-perms --verbose=1 ./server/contact/src/ /private/form-backend/server/contact/src/
          put ./.deploy/contact-config.php -o /private/form-backend/config.php
          chmod 600 /private/form-backend/config.php
          mirror --reverse --delete --no-perms --verbose=1 --exclude-glob .well-known/** ./dist/ /elena-roehrborn.de/
          bye
          LFTP
