name: Deploy website to ALL-INKL

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build
        env:
          PUBLIC_IS_DEMO: "false"
          PUBLIC_SITE_IN_PROGRESS: ${{ vars.PUBLIC_SITE_IN_PROGRESS || 'true' }}

      - name: Install FTPS client
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends lftp

      - name: Deploy dist directory via FTPS
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_SERVER:21" <<'LFTP'
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          set ftp:passive-mode true
          set ftp:ssl-force true
          set ftp:ssl-auth TLS
          set ftp:ssl-protect-data true
          set ssl:verify-certificate true
          mirror --reverse --delete --no-perms --verbose=1 --exclude-glob .well-known/** ./dist/ /elena-roehrborn.de/
          bye
          LFTP
